{% extends "core/base.html" %}
{% block title %}Entrada de stock{% endblock %}
{% block content %}

<h2 class="text-3xl font-bold text-gray-800 mb-6 border-b-2 border-gray-200 pb-2">Entrada de stock</h2>

<div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md">

    {% if messages %}
        {% for message in messages %}
        <div class="p-3 mb-4 rounded-lg
            {% if message.tags == 'error' %}bg-red-100 border-l-4 border-red-500 text-red-700
            {% else %}bg-green-100 border-l-4 border-green-500 text-green-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="space-y-5">
        {% csrf_token %}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Producto *</label>
            <select name="producto" id="producto" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#233b6e]">
                <option value="">— Selecciona un producto —</option>
                {% for p in productos %}
                <option value="{{ p.id }}"
                    {% if request.GET.producto == p.id|stringformat:"s" %}selected{% endif %}>
                    {{ p.nombre }} — Stock actual: {{ p.stock }}
                </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Cantidad a agregar *</label>
            <input type="number" name="cantidad" min="1" value="1" required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#233b6e]">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Motivo</label>
            <input type="text" name="motivo" placeholder="Ej: Compra a proveedor, ajuste de inventario..."
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#233b6e]">
        </div>

        <div class="flex justify-end gap-4 pt-4 border-t border-gray-200">
            <a href="{% url 'inventario:stock_list' %}"
               class="bg-red-100 text-red-800 font-semibold py-2 px-6 rounded-lg hover:bg-red-200 transition-colors">
                Cancelar
            </a>
            <button type="submit"
                    class="bg-[#233b6e] text-white font-semibold py-2 px-6 rounded-lg hover:bg-[#1a2c53] transition-colors">
                ✅ Confirmar entrada
            </button>
        </div>
    </form>
</div>
{% endblock %}
