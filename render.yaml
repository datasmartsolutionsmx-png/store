services:
  - type: web
    name: store
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn store_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: store_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: store_db
    databaseName: store
    user: store_user