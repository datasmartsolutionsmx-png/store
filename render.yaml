services:
  - type: web
    name: store
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && gunicorn store_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: store_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CLOUDINARY_CLOUD_NAME
        value: tu_cloud_name
      - key: CLOUDINARY_API_KEY
        value: tu_api_key
      - key: CLOUDINARY_API_SECRET
        value: tu_api_secret

databases:
  - name: store_db
    databaseName: store
    user: store_user