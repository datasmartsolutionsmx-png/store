services:
  - type: web
    name: store
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn store_project.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: store_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CLOUDINARY_CLOUD_NAME
        value: dsf50ge9w
      - key: CLOUDINARY_API_KEY
        value: 637785451297246
      - key: CLOUDINARY_API_SECRET
        value: tEizIbwPMdh0rCXQbGiSvfIsnsA
      - key: CLOUDINARY_URL
        value: cloudinary://637785451297246:tEizIbwPMdh0rCXQbGiSvfIsnsA@dsf50ge9w

databases:
  - name: store_db
    databaseName: store
    user: store_user